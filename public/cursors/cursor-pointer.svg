<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28">
  <!-- Neo Brutalism bold pointer/hand cursor -->
  <!-- Pointing finger -->
  <rect x="8" y="0" width="5" height="14" rx="2" fill="#FF6B9D" stroke="#000000" stroke-width="2"/>
  <!-- Middle finger -->
  <rect x="14" y="3" width="5" height="11" rx="2" fill="#FF6B9D" stroke="#000000" stroke-width="2"/>
  <!-- Ring finger -->
  <rect x="20" y="5" width="5" height="9" rx="2" fill="#FF6B9D" stroke="#000000" stroke-width="1.5" transform="scale(0.8) translate(1, 2)"/>
  <!-- Palm -->
  <rect x="3" y="12" width="18" height="12" rx="3" fill="#FF6B9D" stroke="#000000" stroke-width="2"/>
  <!-- Thumb -->
  <rect x="1" y="13" width="6" height="5" rx="2" fill="#FF6B9D" stroke="#000000" stroke-width="2"/>
</svg>
